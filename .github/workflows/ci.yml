name: CI

# Run on every push to main/master and on every pull request targeting those
# branches. This validates the full unit-test suite, which exercises:
#   - All five detection categories (A–E)
#   - Risk engine and edge scoring
#   - FastAPI server endpoints (via TestClient — no live server required)
#   - Snapshot diff engine
#   - SharpHound ingestion pipeline
#   - CLI entry points
# No Neo4j instance is required; all tests use in-memory fixtures.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: "pytest · Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false          # Show failures for all Python versions, not just the first
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up the requested Python version ─────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip            # Cache pip downloads between runs

      # ── 3. Install the package and all dev dependencies ───────────────────
      #     The [dev] extra pulls in pytest, pytest-asyncio, and httpx
      #     (the latter is the FastAPI TestClient backend).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ── 4. Run the full unit-test suite ───────────────────────────────────
      - name: Run tests
        run: pytest tests/ -v --tb=short
